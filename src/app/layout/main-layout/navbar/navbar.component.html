
<mat-toolbar color="primary" class="navbar">
  <span class="logo">Ecoride</span>

  <!-- Espace entre logo et liens -->
  <span class="spacer"></span>

  <!-- Menu burger en mobile -->
  <button mat-icon-button [matMenuTriggerFor]="menu" class="menu-button mobile-only">
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Liens en desktop -->
  <nav class="desktop-only">
    <a mat-button routerLink="/publier">Publier un trajet</a>
    <a mat-button routerLink="/search">Rechercher</a>
    <a mat-button routerLink="/contact">Contact</a>
    @if (isLogged()) {
      <a mat-button routerLink="/user">Mon compte</a>
      <a mat-button (click)="logout()">Se deconnecter</a>
    } @else {
      <a mat-button routerLink="/auth/login">S'identifier'</a>
    }
  </nav>
</mat-toolbar>

<!-- Menu mobile -->
<mat-menu #menu="matMenu">
  <button mat-menu-item routerLink="/publier">Publier un trajet</button>
  <button mat-menu-item routerLink="/search">Rechercher</button>
  <button mat-menu-item routerLink="/contact">Contact</button>
  @if (isLogged()) {
    <button mat-menu-item routerLink="/user">Mon compte</button>
    <a mat-button (click)="logout()">Se deconnecter</a>
  } @else {
    <a mat-button routerLink="/auth/login">S'identifier'</a>
  }
</mat-menu>
