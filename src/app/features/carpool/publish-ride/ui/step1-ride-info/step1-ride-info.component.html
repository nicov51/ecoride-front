<form [formGroup]="rideForm" (ngSubmit) = "onNextStep()"  class="form-container">

  <div *ngIf="cars.length === 0" class="w-full">
    Vous devez enregistrer un véhicule pour publier un trajet.
  </div>

  <mat-form-field appearance="outline">
    <mat-label>Lieu de départ</mat-label>
    <input
      matInput
      formControlName="departurePlace"
      placeholder="rue des moissons, Reims"
      [matAutocomplete]="autoDeparture"
    >
    <mat-autocomplete #autoDeparture="matAutocomplete" [displayWith]="displayFn">
      <!-- Boucle sur les options filtrées -->
      <mat-option *ngFor="let option of filteredDepartureOptions$ | async" [value]="option">
        <!-- Affichage du nom complet -->
        {{ option.display_name }}
      </mat-option>
    </mat-autocomplete>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Lieu d'arrivée</mat-label>
    <input
      matInput
      formControlName="arrivalPlace"
      placeholder="rue de l'eglise, Troyes"
      [autocomplete]="autoArrival"
    >
    <mat-autocomplete #autoArrival="matAutocomplete" [displayWith]="displayFn">
      <mat-option *ngFor="let option of filteredArrivalOptions$ | async" [value]="option">
        {{ option.display_name }}
      </mat-option>
    </mat-autocomplete>
  </mat-form-field>

  <div>
    <mat-form-field appearance="outline">
      <mat-label>Date départ</mat-label>
      <input matInput formControlName="departureDate" [matDatepicker]="picker" >
      <mat-hint>MM/DD/YYYY</mat-hint>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Heure de départ</mat-label>
      <input matInput formControlName="departureTime" type="time">
    </mat-form-field>
  </div>

  <mat-form-field appearance="outline" class="w-full" *ngIf="cars.length > 0">
    <mat-label>Véhicule</mat-label>
    <mat-select formControlName="carId">
      <mat-option *ngFor="let car of cars" [value]="car.id">
        {{ car.model }} ({{ car.fuel }}) - {{ car.color }}
      </mat-option>
    </mat-select>
  </mat-form-field>


  <div>
    <button mat-raised-button type="submit" [disabled]="!rideForm.valid">
      Etape suivante
    </button>
  </div>

</form>
