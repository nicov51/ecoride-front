<div class="search-container">
  <aside class="sidebar">
    <app-search-filters [formGroup]="filterForm" />
  </aside>

  <main class="main-content">
    <app-search-form (submitted)="handleSearch($event)" />

    @if (loading) {
      <mat-spinner diameter="50" class="spinner"></mat-spinner>
    } @else {
      <app-search-results
        [rides]="rides"
        [suggestedRides]="suggestedRides"
        (join)="handleJoin($event)"
        (viewDetails)="onViewDetails($event)"
      />
    }
  </main>
</div>
