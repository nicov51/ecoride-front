<div class="search-container">
  <!-- Sidebar à gauche -->
  <aside class="sidebar">
    <app-search-filters [filterForm]="filterForm" />
  </aside>

  <!-- Formulaire + Résultats -->
  <main class="main-content">
    <app-search-form (submitted)="handleSearchSubmit($event)" />

    <app-search-results
      [filters]="searchParams"
      [filterForm]="filterForm"
    />
  </main>
</div>
