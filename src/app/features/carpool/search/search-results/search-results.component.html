<p>search-results works!</p>
<div class="filters">
  <mat-slide-toggle [(ngModel)]="ecoOnly">Écologique uniquement</mat-slide-toggle>

  <mat-form-field>
    <mat-label>Prix max</mat-label>
    <input matInput type="number" [(ngModel)]="maxPrice" />
  </mat-form-field>
</div>

@if (filteredRides.length > 0) {
  @for (ride of filteredRides; track ride.id) {
    <app-ride-details [ride]="ride" (showDetails)="showDetails(ride.id)" />
  }
} @else {
  <p>Aucun trajet trouvé. Essayez une autre date.</p>
  <button mat-button (click)="suggestAlternativeDate()">
    Voir les trajets le {{ closestDate | date }}
  </button>
}
