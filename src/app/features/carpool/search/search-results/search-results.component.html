<p *ngIf="!filters">Veuillez lancer une recherche</p>

<div *ngIf="filters">
  <div *ngIf="filteredRides.length > 0; else noResults">
    <div *ngFor="let ride of filteredRides">
      <p>{{ ride.departure }} → {{ ride.arrival }} | {{ ride.price }}€</p>
    </div>
  </div>

  <ng-template #noResults>
    <p>Aucun résultat trouvé avec ces filtres.</p>
  </ng-template>
</div>
