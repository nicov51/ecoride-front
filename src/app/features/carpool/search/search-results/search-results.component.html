@if (rides && rides.length > 0) {
  <div class="results-grid">
    @for (ride of rides; track ride.id) {
      <app-ride-card
        [ride]="ride"
        (viewDetails)="viewDetails.emit($event)"
        (joinRide)="handleJoin($event)"
      />
    }
  </div>
} @else {
  <div class="no-results">
    <mat-icon>search_off</mat-icon>
    <p>Aucun trajet trouvé avec ces critères</p>

    @if (suggestedRides && suggestedRides.length > 0) {
      <div class="suggestions">
        <h3>Trajets disponibles autour de cette date :</h3>
        <div class="results-grid">
          @for (ride of suggestedRides; track ride.id) {
            <app-ride-card [ride]="ride" (viewDetails)="handleJoin(ride.id)"/>
          }
        </div>
      </div>
    }
  </div>
}
