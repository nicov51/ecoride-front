<!-- Bouton menu visible seulement sur mobile -->
@if (isMobile){
<button mat-icon-button class="menu-toggle" (click)="toggleDrawer()">
  <mat-icon>chevron_right</mat-icon>
</button>
}
<mat-drawer-container class="sidebar-container">
  <mat-drawer
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="drawerOpened"
    class="sidebar"
  >

    <mat-nav-list>
      @for (item of filteredSidebarItems(); track item.path) {
      <a
        mat-list-item
        [routerLink]="item.path"
         routerLinkActive="active"
         (click)="onItemClick()"
      >
        <mat-icon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </a>
      }
    </mat-nav-list>
  </mat-drawer>

  <mat-drawer-content>
    <router-outlet></router-outlet>
  </mat-drawer-content>
</mat-drawer-container>
