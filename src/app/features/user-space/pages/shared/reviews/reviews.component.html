<!-- reviews.component.html -->
<div class="reviews-container">
  <h2>Mes Avis</h2>

  <div class="reviews-list">
    <mat-card *ngFor="let review of reviews" class="review-card">
      <mat-card-header>
        <div mat-card-avatar class="review-avatar">
          <mat-icon>account_circle</mat-icon>
        </div>
        <mat-card-title>Note: {{ review.rating }}/5</mat-card-title>
        <mat-card-subtitle>
          Statut:
          <span [class]="'status-' + review.status">
            {{ review.status }}
          </span>
        </mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <div class="stars">
          <mat-icon *ngFor="let star of [1,2,3,4,5]"
                    [class.filled]="star <= review.rating">
            {{ star <= review.rating ? 'star' : 'star_border' }}
          </mat-icon>
        </div>
        <p class="comment">{{ review.comment }}</p>
      </mat-card-content>
    </mat-card>
  </div>
</div>
