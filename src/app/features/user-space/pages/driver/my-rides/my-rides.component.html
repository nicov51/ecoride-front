
<div class="rides-container">
  <h2>Mes Covoiturages</h2>

  <div class="rides-list" *ngIf="rides$ | async as rides; else loadingTpl">
    <mat-card *ngFor="let ride of rides" class="ride-card">
      <mat-card-header>
        <mat-card-title>
          {{ ride.departureZone?.label }} → {{ ride.arrivalZone?.label }}
        </mat-card-title>
        <mat-card-subtitle>
          {{ ride.departureDateTime | date:'short' }}
        </mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p><mat-icon>people</mat-icon> Places: {{ ride.seats }}</p>
        <p><mat-icon>euro_symbol</mat-icon> Prix: {{ ride.price }} crédits</p>
        <p><mat-icon>info</mat-icon> Statut:
          <span [class]="'status-' + ride.status">
            {{ ride.status }}
          </span>
        </p>
      </mat-card-content>

      <mat-card-actions>
        <button mat-button color="primary"
                *ngIf="ride.status === RideStatus.PENDING"
                (click)="startRide(ride)">
          <mat-icon>play_arrow</mat-icon> Démarrer
        </button>

        <button mat-button color="primary"
                *ngIf="ride.status === RideStatus.IN_PROGRESS"
                (click)="completeRide(ride)">
          <mat-icon>check</mat-icon> Terminer
        </button>

        <button mat-button color="warn"
                *ngIf="ride.status !== RideStatus.COMPLETED"
                (click)="cancelRide(ride)">
          <mat-icon>close</mat-icon> Annuler
        </button>
      </mat-card-actions>
    </mat-card>
  </div>

  <ng-template #loadingTpl>
    <p>Chargement des trajets...</p>
  </ng-template>
</div>
