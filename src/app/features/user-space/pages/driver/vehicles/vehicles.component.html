<div class="vehicles-container">
  <h2>Mes Véhicules</h2>

  <button mat-raised-button color="primary" (click)="addVehicle()">
    <mat-icon>add</mat-icon> Ajouter un véhicule
  </button>

  <div class="vehicles-list">
    <mat-card *ngFor="let vehicle of vehicles" class="vehicle-card">
      <mat-card-header>
        <mat-card-title>{{ vehicle.model }}</mat-card-title>
        <mat-card-subtitle>
          {{ vehicle.color }} • {{ vehicle.fuel }} • {{ vehicle.firstRegistration | date:'yyyy' }}
        </mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p><mat-icon>badge</mat-icon> {{ vehicle.registration }}</p>
      </mat-card-content>

      <mat-card-actions>
        <button mat-icon-button color="warn" (click)="removeVehicle(vehicle.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
