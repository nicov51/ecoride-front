<div class="preferences-container">
  <h2><mat-icon>settings</mat-icon> Mes Préférences de Trajet</h2>

  <!-- Discussion -->
  <div class="preference-section">
    <div class="section-header">
      <mat-icon>forum</mat-icon>
      <h3>Discussion pendant le trajet</h3>
    </div>
    <mat-chip-listbox aria-label="Préférence discussion">
      <mat-chip
        [color]="preferences.chat === 'yes' ? 'primary' : undefined"
        (click)="updatePreference('chat', 'yes')">
        Oui
      </mat-chip>
      <mat-chip
        [color]="preferences.chat === 'no' ? 'primary' : undefined"
        (click)="updatePreference('chat', 'no')">
        Non
      </mat-chip>
    </mat-chip-listbox>
  </div>

  <!-- Fumeur -->
  <div class="preference-section">
    <div class="section-header">
      <mat-icon>smoking_rooms</mat-icon>
      <h3>Fumeur dans la voiture</h3>
    </div>
    <mat-chip-listbox aria-label="Préférence fumeur">
      <mat-chip
        [color]="preferences.smoking === 'yes' ? 'primary' : undefined"
        (click)="updatePreference('smoking', 'yes')">
        Autorisé
      </mat-chip>
      <mat-chip
        [color]="preferences.smoking === 'no' ? 'primary' : undefined"
        (click)="updatePreference('smoking', 'no')">
        Interdit
      </mat-chip>
    </mat-chip-listbox>
  </div>

  <!-- Musique -->
  <div class="preference-section">
    <div class="section-header">
      <mat-icon>music_note</mat-icon>
      <h3>Musique pendant le trajet</h3>
    </div>
    <mat-chip-listbox aria-label="Préférence musique">
      <mat-chip
        [color]="preferences.music === 'yes' ? 'primary' : undefined"
        (click)="updatePreference('music', 'yes')">
        Oui
      </mat-chip>
      <mat-chip
        [color]="preferences.music === 'no' ? 'primary' : undefined"
        (click)="updatePreference('music', 'no')">
        Non
      </mat-chip>
    </mat-chip-listbox>
  </div>

  <!-- Animaux -->
  <div class="preference-section">
    <div class="section-header">
      <mat-icon>pets</mat-icon>
      <h3>Animaux acceptés</h3>
    </div>
    <mat-chip-listbox aria-label="Préférence animaux">
      <mat-chip
        [color]="preferences.pets === 'yes' ? 'primary' : undefined"
        (click)="updatePreference('pets', 'yes')">
        Oui
      </mat-chip>
      <mat-chip
        [color]="preferences.pets === 'no' ? 'primary' : undefined"
        (click)="updatePreference('pets', 'no')">
        Non
      </mat-chip>
    </mat-chip-listbox>
  </div>

  <!-- Autres préférences -->
  <div class="preference-section other-preferences">
    <div class="section-header">
      <mat-icon>more_horiz</mat-icon>
      <h3>Autres préférences</h3>
    </div>
    <mat-form-field appearance="outline">
      <textarea matInput
                [(ngModel)]="preferences.other"
                placeholder="Ex: Pas de parfum fort, préférence horaires...">
      </textarea>
    </mat-form-field>
  </div>
</div>
