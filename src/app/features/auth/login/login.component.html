<h2>Connexion</h2>

<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form-container">
  <!-- Email -->
  <mat-form-field appearance="outline" class="field full-width">
    <mat-label>Email</mat-label>
    <input matInput formControlName="email" type="email" />
    <mat-error *ngIf="loginForm.controls.email.invalid">
      <span *ngIf="loginForm.controls.email.hasError('required')">Email requis</span>
      <span *ngIf="loginForm.controls.email.hasError('email')">Email invalide</span>
    </mat-error>
  </mat-form-field>

  <!-- Mot de passe -->
  <mat-form-field appearance="outline" class="field full-width">
    <mat-label>Mot de passe</mat-label>
    <input matInput formControlName="password" type="password" />
    <mat-error *ngIf="loginForm.controls.password.invalid">
      Mot de passe requis
    </mat-error>
  </mat-form-field>

  <!-- Message d'erreur -->
  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>

  <!-- Bouton de soumission -->
  <button
    mat-raised-button
    color="primary"
    type="submit"
    class="submit-btn"
    [disabled]="isLoading"
  >
    <span *ngIf="!isLoading">Se connecter</span>
    <span *ngIf="isLoading">Connexion en cours...</span>
  </button>
</form>

<p class="link-to-register">
  Pas encore de compte ? <a routerLink="/auth/register">Créer un compte</a>
</p>
